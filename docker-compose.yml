name: pretty-little-manager

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pretty_little_manager
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: plm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - plm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm -d pretty_little_manager"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - plm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: plm
      MINIO_ROOT_PASSWORD: plm_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - plm_minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  plm_postgres_data:
  plm_redis_data:
  plm_minio_data:
